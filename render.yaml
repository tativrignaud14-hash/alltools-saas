services:
  - type: worker
    name: alltools-worker
    runtime: node
    plan: starter
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @alltools/workers build
    startCommand: corepack pnpm --filter @alltools/workers start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: REDIS_URL
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
